syntax = "proto3";

package intrinsic_proto.pubsub.common;

option go_package = "intrinsic/platform/pubsub/common/command_go_proto";

import "intrinsic/platform/pubsub/connect/cloud/proto/v1alpha1/internal/line_orchestration_config.proto";

// Common interface for a command.
message Command {
  // Identifier of the command.
  string command_id = 1;

  // Known command payload
  KnownCommand known_command = 2;
}

message KnownCommand {
  oneof command_type {
    intrinsic_proto.pubsub.connect.v1alpha1.internal.HubConnectCommand
        hub_connect_command = 1;
    intrinsic_proto.pubsub.connect.v1alpha1.internal.KeyexprForwardingCommand
        keyexpr_forwarding_command = 2;
  }
}

// Result of execution of a single command.
message CommandExecutionStatus {
  // Identifier of the command.
  string command_id = 1;

  // True if the command has succeeded.
  bool succeeded = 2;

  // Error message describing why the command failed.
  string error_message = 3;
}
