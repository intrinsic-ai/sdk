syntax = "proto3";

package intrinsic_proto.kvstore;

import "google/protobuf/any.proto";

option go_package = "intrinsic/platform/pubsub/kvstore_grpc/kvstore_go_proto";

message GetRequest {
  string key = 1;
}

message GetResponse {
  google.protobuf.Any value = 1;
}

message SetRequest {
  string key = 1;
  google.protobuf.Any value = 2;

  enum Consistency {
    CONSISTENCY_UNSPECIFIED = 0;

    // Waits for reads to return the written value.
    CONSISTENCY_HIGH = 1;

    // Writes without any additional waiting.
    CONSISTENCY_BEST_EFFORT = 2;
  };

  // Specifies the consistency policy to use when setting the value.
  Consistency consistency = 3;
}

message SetResponse {}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {}

message ListRequest {}

message ListResponse {
  repeated string keys = 1;
}

// A GRPC wrapper around the zenohd key-value store.
service KVStore {

  // Get a value from the store.
  rpc Get(GetRequest) returns (GetResponse) {}
  // Set a value in the store.
  rpc Set(SetRequest) returns (SetResponse) {}
  // Delete a value from the store.
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
  // List all keys in the store.
  rpc List(ListRequest) returns (ListResponse) {}
}
