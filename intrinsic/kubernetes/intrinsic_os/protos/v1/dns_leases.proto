syntax = "proto3";

package intrinsic_proto.cluster.v1;

import "google/api/field_behavior.proto";

option go_package = "intrinsic/kubernetes/intrinsic_os/protos/v1/dns_leases_go_proto";

message DNSLease {
  string hw_addr = 1 [(google.api.field_behavior) = REQUIRED];
  string ip_addr = 2 [(google.api.field_behavior) = REQUIRED];
  string hostname = 3 [(google.api.field_behavior) = OPTIONAL];
}

message GetDNSLeasesRequest {
  string interface = 3 [(google.api.field_behavior) = OPTIONAL];
}

message InterfaceDNSLeases {
  string interface_name = 1;
  repeated DNSLease leases = 2;
}

message GetDNSLeasesResponse {
  repeated InterfaceDNSLeases interfaces = 1;
}
