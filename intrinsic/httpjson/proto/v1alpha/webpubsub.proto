syntax = "proto3";

package intrinsic.httpjson.v1alpha;

option go_package = "intrinsic/httpjson/proto/v1alpha/webpubsub_go_proto";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

service WebPubSub {
  // Generates transient WebRTC TURN credentials.
  rpc GenerateTurnCredentials(google.protobuf.Empty)
      returns (GenerateTurnCredentialsResponse) {
    option (google.api.http) = {
      post: "/webpubsub/v1alpha:generateTurnCredentials"
      body: "*"
    };
  }
}

// Contains transient credentials and server endpoints to authenticate
// with Intrinsic's TURN relay servers.
message GenerateTurnCredentialsResponse {
  // The TURN server URIs for the WebRTC client connection.
  repeated string uris = 1;

  // A transient username.
  string username = 2;

  // A transient password.
  string password = 3;
}
