syntax = "proto3";

package intrinsic_proto.solution_versions.v1;

import "intrinsic/solution_versions/proto/v1/diff_mask.proto";

option go_package = "intrinsic/solution_versions/proto/v1/solution_diff_go_proto";

// SolutionDiff represents a sparse patch and mask of changes relative to a
// reference version.
message SolutionDiff {
  // A custom mask used to interpret and apply the solution_patch, using paths
  // that point at locations in the solution_patch. Changes must be applied in
  // the order specified in the mask.
  DiffMask mask = 2;
}

// OverlaidSolutionDiff represents the result of an additive merge between two
// solutions. It contains the combined solution and a complete mask of all
// differences evaluated, including the removals that were intentionally
// ignored.
message OverlaidSolutionDiff {
  // A complete mask of the differences found between the two
  // solutions. This tracks all evaluated changes (additions, updates, and
  // removals), serving as an audit of the diff rather than an application
  // guide.
  DiffMask mask = 2;
}
