syntax = "proto3";

package intrinsic_proto.icon;

import "intrinsic/icon/proto/cart_space.proto";

option go_package = "intrinsic/icon/equipment/force_control_settings_go_proto";

message ForceControlSettings {
  // Maximum value of the euclidean norm of the measured force (measured at a
  // tool frame) at which point a stop action should be triggered. Defined in
  // N.
  double excessive_force_threshold = 1;

  // Maximum value of the euclidean norm of the measured torque (measured at a
  // tool frame) at which point a stop action should be triggered. Defined in
  // N m.
  double excessive_torque_threshold = 2;

  // The desired virtual cartesian inertia for all translational elements, in
  // kg.
  double virtual_translational_inertia = 3;

  // The desired virtual cartesian inertia for all rotational elements, in
  // kg m².
  double virtual_rotational_inertia = 4;

  // Deadband to be applied to the sensed wrench. Wrench values below this band
  // will be truncated. Useful for masking small wrench artifacts such as cable
  // tugging or sensor drift.
  intrinsic_proto.icon.Wrench sensed_wrench_deadband = 5;

  // Settings to configure the instability detection algorithm based on force /
  // torque measured at the tool frame.
  InstabilityDetectionSettings instability_detection_settings = 8;
}

// A set of parameters to configure the computation of the stability index based
// on force / torque measurement (measured at the tool frame), which is used to
// detect instability during force control.
message InstabilityDetectionSettings {
  // The frequency value separating low from high frequencies, in Hz. Valid
  // range is [1.0, 0.5 * f_c], where `f_c` is the robot control frequency.
  // Ideally, this is the maximum observable frequency during stable
  // interactions. Default value is 4 Hz.
  optional double crossover_frequency = 1;

  // A critical threshold for the Root-Mean-Square of the measured force at the
  // tool frame, in N. Stability index growth will be limited to instances
  // where the RMS of the measured force approaches or exceeds this value on any
  // dimension. Ideally, this is the minimum force (distinguishable from noise)
  // observable during unstable interactions. Default value is 10 N.
  optional double force_rms_threshold = 2;

  // A critical threshold for the Root-Mean-Square of the measured torque at the
  // tool frame, in N m. Stability index growth will be limited to instances
  // where the RMS of the measured torque approaches or exceeds this value on
  // any dimension. Ideally, this is the minimum torque (distinguishable from
  // noise) observable during unstable interactions. Default value is 4 N m.
  optional double torque_rms_threshold = 3;
}
