syntax = "proto3";

package intrinsic_proto.icon.v1;

option go_package = "intrinsic/icon/hal/lib/adio/v1/adio_bus_component_config_go_proto";

// Next ID: 10
message AdioBusComponent {
  // Name of the hardware interface.
  string interface_name = 1;

  oneof bus_variable {
    // A digital input bus variable. Will be represented as as block of
    // individual (optionally named) bits.
    DigitalVariable digital_input_variable = 6;
    // A list of analog input bus variables. Will be represented as a block of
    // individual (optionally named) floating point values.
    AnalogVariables analog_input_variables = 7;
    // A digital output bus variable. Will be represented as as block of
    // individual (optionally named) bits.
    DigitalVariable digital_output_variable = 8;
    // A list of analog output bus variables. Will be represented as a block of
    // individual (optionally named) floating point values.
    AnalogVariables analog_output_variables = 9;
  }

  message AnalogVariables {
    // A list of individual analog value PDOs.
    repeated AnalogVariable variables = 1;
  }

  message AnalogVariable {
    // The name of the analog variable in the process image.
    string variable_name = 1;
    // Optional alias for the variable.
    optional string alias = 2;
  }

  message DigitalVariable {
    // The name of the digital variable in the process image.
    string variable_name = 1;
    // If the value referenced by `variable_name` is an array, this is the index
    // of the array element.
    optional uint64 array_index = 3;

    // Optional aliases for the individual bits of the variable.
    // The key is the bit index (LSB first) and the value is the alias.
    // The indices are zero indexed and need to be smaller than the size of the
    // variable.
    map<uint32, string> bit_index_to_alias = 4;
    reserved 2;
    reserved "aliases_in_index_order";
  }

  reserved 2, 3, 4, 5;
  reserved "digital_input_variable_name", "analog_input_variable_name",
      "digital_output_variable_name", "analog_output_variable_name";
}
