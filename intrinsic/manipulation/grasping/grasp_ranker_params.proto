syntax = "proto3";

package intrinsic_proto.grasping;

import "intrinsic/kinematics/types/joint_limits.proto";
import "intrinsic/manipulation/grasping/grasp_placement_constraint.proto";
import "intrinsic/world/proto/collision_settings.proto";
import "intrinsic/world/proto/object_world_refs.proto";

option go_package = "intrinsic/manipulation/grasping/grasp_ranker_params_go_proto";

message PinchGripperParams {
  // Reference to the pinch gripper object.
  world.ObjectReference eoat_reference = 1;
  // Joint positions for fully opening the gripper fingers.
  repeated double open_position = 2;
  // Joint positions for fully closing the gripper fingers.
  repeated double close_position = 3;
}

message GraspReachabilityParams {
  // Robot's joint angle limits applied when calculating how to reach the grasp
  // and pre-grasp poses. Must not exceed the robot's overall application
  // limits. If not specified, the application limits are used.
  optional intrinsic_proto.JointLimitsUpdate joint_limits = 1;

  // Optional segment-specific collision settings to apply at the grasp pose.
  // If not specified, standard default collision checks are performed.
  // E.g., users can set `disable_collision_checking: true` to turn off grasp
  // pose collision checks entirely, or specify collision exclusion rules
  // for gripper parts.
  optional intrinsic_proto.world.CollisionSettings
      grasp_pose_collision_settings = 2;

  // Parameters for pinch gripper used for collision checks. If specified, pinch
  // gripper collisions will be checked at grasp pose.
  // Do not set this field if the gripper is not a pinch gripper type.
  optional PinchGripperParams pinch_gripper_params = 3;

  // Whether to check if a continuous straight-line approach path between
  // pregrasp and grasp poses exists and is collision-free. Disabled by default.
  optional bool check_straight_line_approach = 4;

  // If true, check the full trajectory from the robot's current joint position
  // to pregrasp pose and then to grasp pose. Otherwise, only check the
  // straightline segment from pregrasp pose to grasp pose.
  optional bool check_full_trajectory = 6;

  reserved 5;
}

message HeightRankerParams {
  // Minimum expected height (in meters) of an object when grasping, expressed
  // in root frame. Defaults to 0.0 if unspecified.
  optional float min_grasp_height = 1;
  // Maximum expected height (in meters) of an object when grasping, expressed
  // in root frame. Defaults to 2.0 if unspecified.
  optional float max_grasp_height = 2;

  reserved 3;
  reserved "name";
}

message VisibilityRankerParams {
  // Minimum detection visibility threshold in range [0.0, 1.0] for a grasp
  // to be considered valid.
  // Visibility is estimated by the perception sensor: 0.0 means the object
  // is completely occluded/not visible, and 1.0 means it is fully visible.
  float visibility_threshold = 2;

  reserved 1, 3;
  reserved "use_visibility_ranker", "name";
}

message TopDownGraspRankerParams {
  // Used to filter out grasps based on how "top down" their approaching
  // directions are. Grasps whose normalized top-down value is less
  // than this will have a score of 0. E.g., When this is 0.5, all horizontal
  // and bottom-up pointed grasps are scored 0; if 0.75, then all grasps lower
  // than 45 degrees top-down are scored 0.
  // Defaults to 0.5 if unspecified.
  optional float top_down_score_threshold = 1;

  reserved 2;
  reserved "name";
}

message PlacementConstraintCheckerParams {
  // Placement constraints to consider during grasp planning.
  intrinsic_proto.grasping.PlacementConstraints placement_constraints = 1;

  reserved 2;
  reserved "name";
}

message GraspScoringHeuristic {
  oneof heuristic {
    HeightRankerParams height_ranker = 1;
    VisibilityRankerParams visibility_ranker = 2;
    TopDownGraspRankerParams top_down_ranker = 3;
    PlacementConstraintCheckerParams placement_constraint_checker = 4;
  }
  // The weight of this heuristic for computing the overall grasp score.
  // Higher weight increases the relative importance of this heuristic.
  // Must be non-negative (>= 0). Defaults to 1.0 (except visibility_ranker
  // which defaults to 10.0 if others are left unspecified). All weights are
  // dynamically normalized during planning to have an average value of 1.0.
  optional float weight = 5;
}

message GraspScoringHeuristics {
  // A list of heuristics used to score and rank candidate grasps.
  repeated GraspScoringHeuristic heuristics = 1;
}
